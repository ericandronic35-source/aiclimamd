<!-- Quick Order Modal -->
<div class="qo-modal" id="qoModal" onclick="if(event.target===this)closeQO()"><div class="qo-box"><div class="qo-head"><h3>Comandă Rapidă</h3><button onclick="closeQO()">×</button></div><div class="qo-body"><div class="qo-prod" id="qoProd"></div><div class="qo-field"><label>Numele tău</label><input type="text" id="qoName" placeholder="Ion Popescu" autocomplete="name"/></div><div class="qo-field"><label>Telefon</label><input type="tel" id="qoPhone" placeholder="+373 69 000 000" autocomplete="tel"/></div><div class="qo-field"><label>Instalare?</label><select id="qoInstall"><option value="da">Cu instalare</option><option value="nu">Doar produsul</option></select></div><button class="qo-submit" onclick="submitQO()">Sună-mă în 15 min</button><p style="font-size:10px;color:var(--muted);text-align:center;margin-top:10px">Fără avans. Plata la livrare sau prin rate 0%.</p></div></div></div>

<!-- Checkout Modal -->
<div class="checkout-modal" id="checkoutModal" onclick="if(event.target===this)closeCheckout()"><div class="checkout-box"><div class="co-head"><h3>Finalizare Comandă</h3><button onclick="closeCheckout()">×</button></div><div class="co-body"><div class="co-summary"><h4>Produsele Selectate</h4><div id="orderSummaryItems"></div></div><div class="co-total-row"><span>Total comandă:</span><strong id="orderTotal">0 lei</strong></div><div class="co-field"><label>Nume Prenume *</label><input type="text" id="ordName" placeholder="Ex: Ion Popescu"></div><div class="co-field"><label>Telefon *</label><input type="tel" id="ordPhone" placeholder="+373 60 000 000"></div><div class="co-field"><label>Adresa de livrare</label><input type="text" id="ordAddr" placeholder="Strada, nr. apartament, localitate"></div><div class="co-field"><label>Metodă de plată</label><div class="co-methods"><div class="co-method sel" onclick="selMethod(this)">Numerar</div><div class="co-method" onclick="selMethod(this)">Transfer</div><div class="co-method" onclick="selMethod(this)">Rate 0%</div></div></div>
