<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Import Firebase Products</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>🔥 Import produse în Firebase</h2>

<p>Lipește JSON-ul aici:</p>

<textarea id="jsonInput" style="width:100%; height:300px;">
[
  {
    "name": "TEST PRODUS",
    "brand": "TEST",
    "price": 100,
    "shortDescription": "Produs test",
    "features": ["test"],
    "images": []
  }
]
</textarea>

<br><br>

<button onclick="importProducts()" style="padding:10px 20px;">
IMPORT
</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 PUI CONFIGURAREA TA DE FIREBASE AICI
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE",
  messagingSenderId: "PASTE_HERE",
  appId: "PASTE_HERE"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🔥 IMPORT FUNCTION
window.importProducts = async function () {

  const status = document.getElementById("status");

  try {

    const products = JSON.parse(document.getElementById("jsonInput").value);

    status.innerText = "Se importă...";

    for (let product of products) {
      await addDoc(collection(db, "products"), product);
    }

    status.innerText = "✅ Gata! Produsele au fost importate.";

  } catch (err) {
    status.innerText = "❌ Eroare la JSON sau Firebase";
    console.log(err);
  }
};

</script>

</body>
</html>
